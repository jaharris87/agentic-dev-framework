name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Replace the jobs below with your project's actual build/test/lint toolchain.
# The structure (lint → typecheck → test as independent parallel jobs) is
# intentional — it gives fast feedback on the most common failure modes.
#
# Examples for common ecosystems:
#
#   Python + uv:      uv sync --dev → ruff check/format → mypy → pytest
#   C++ + CMake:      cmake -B build → cmake --build build → clang-tidy → ctest
#   Fortran + CMake:  cmake -B build → cmake --build build → fprettify --diff → ctest
#   Fortran + fpm:    fpm build → fprettify --diff → fpm test
#   Rust:             cargo build → cargo clippy / cargo fmt --check → cargo test
#   Node.js:          npm ci → eslint / prettier --check → tsc --noEmit → jest
#   Go:               go build → golangci-lint → go test ./...

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # TODO: Add your toolchain setup and build steps
      # - uses: ...
      # - run: ...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # TODO: Add your linter and formatter checks
      # - run: ...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # TODO: Add your test runner
      # - run: ...
